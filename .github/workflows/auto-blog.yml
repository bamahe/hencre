name: Auto-Publish Blog Post

on:
  schedule:
    # Mon/Wed/Fri at 10:00 AM ET (14:00 UTC)
    - cron: '0 14 * * 1,3,5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk

      - name: Generate and publish blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node scripts/auto-blog.mjs

      - name: Commit and push
        run: |
          git config user.name "bamahe"
          git config user.email "barretthenry@gmail.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No new post generated"
            exit 0
          fi
          git commit -m "Auto-publish blog post $(date +%Y-%m-%d)"
          git push
